function makeSprite(rows, scale=2){
  const c = document.createElement('canvas');
  c.width = rows[0].length*scale; c.height = rows.length*scale;
  const g = c.getContext('2d');
  for(let y=0;y<rows.length;y++)for(let x=0;x<rows[y].length;x++){
    const ch = rows[y][x]; if(ch==='.')continue;
    g.fillStyle = PAL[ch]||'#f0f'; g.fillRect(x*scale,y*scale,scale,scale);
  }
  return c;
}

/* =============== AUDIO (Web Audio chiptune) =============== */
let AC=null, musicOn=true, musicTimer=null, musicStep=0;
function audio(){ if(!AC){ AC=new (window.AudioContext||window.webkitAudioContext)(); } if(AC.state==='suspended')AC.resume(); return AC; }
function blip(freq, dur=0.08, type='square', vol=0.12, slide=0){
  try{
    const a=audio(), o=a.createOscillator(), g=a.createGain();
    o.type=type; o.frequency.setValueAtTime(freq,a.currentTime);
    if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,freq+slide),a.currentTime+dur);
    g.gain.setValueAtTime(vol,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+dur);
    o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}
function noise(dur=0.2, vol=0.15, lp=800){
  try{
    const a=audio(), n=a.sampleRate*dur|0, buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
    const src=a.createBufferSource(); src.buffer=buf;
    const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp;
    const g=a.createGain(); g.gain.value=vol;
    src.connect(f).connect(g).connect(a.destination); src.start();
  }catch(e){}
}
// flutterOsc: oscillator whose volume is chopped by an LFO — the secret to a good raspberry
function flutterOsc(f0,f1,dur,type,vol,lfo0,lfo1){
  try{
    const a=audio(), t=a.currentTime;
    const o=a.createOscillator(); o.type=type;
    o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(20,f1),t+dur);
    const g=a.createGain();
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    const l=a.createOscillator(); l.type='square';
    l.frequency.setValueAtTime(lfo0,t);
    l.frequency.linearRampToValueAtTime(lfo1,t+dur);
    const lg=a.createGain(); lg.gain.value=vol*0.7;
    l.connect(lg).connect(g.gain);
    o.connect(g).connect(a.destination);
    o.start(t); o.stop(t+dur); l.start(t); l.stop(t+dur);
  }catch(e){}
}
function bloop(f0,f1,dur,vol){
  try{
    const a=audio(), t=a.currentTime;
    const o=a.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(f1,t+dur);
    const g=a.createGain(); g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g).connect(a.destination); o.start(t); o.stop(t+dur);
  }catch(e){}
}

  { t:150, wave:'square', mv:0.05,
    bass:[110,0,110,131, 147,0,147,131, 110,0,110,131, 165,147,131,110],
    melo:[440,0,523,440, 587,523,0,440, 440,0,523,587, 659,587,523,0] },
  // 1 PIZZA PIT — bouncy tarantella
  { t:128, wave:'triangle', mv:0.055,
    bass:[165,0,82,165, 0,82,196,0, 98,196,0,98, 165,82,165,82],
    melo:[659,784,659,587, 659,0,494,587, 659,784,880,784, 659,587,494,0] },
  // 2 TACO TOWN — brisk mariachi strut
  { t:118, wave:'square', mv:0.05,
    bass:[98,98,147,147, 131,131,147,147, 98,98,147,147, 196,147,131,98],
    melo:[784,0,784,880, 988,0,880,784, 698,0,698,784, 880,784,698,587] },
  // 3 MAMA MIA'S — swooning waltz
  { t:165, wave:'triangle', mv:0.06,
    bass:[131,65,65, 98,49,49, 110,55,55, 98,49,49],
    melo:[523,0,659, 784,0,659, 698,0,587, 659,0,0] },
  // 4 WIENER WORLD — oompah polka
  { t:135, wave:'square', mv:0.055,
    bass:[65,131,65,131, 87,175,87,175, 65,131,65,131, 98,196,87,175],
    melo:[523,0,587,0, 659,659,587,523, 523,0,587,0, 698,659,587,523] },
];
function currentTune(){
  const inLevel=['play','intro','splat','boom','death'].includes(G.scene);
  return TUNES[inLevel?Math.min(G.level,4):0];
}
function musicTick(){
  if(!musicOn||!AC)return;
  const tune=currentTune(), n=tune.bass.length;
  const b=tune.bass[musicStep%n], m=tune.melo[musicStep%n];
  if(b)blip(b,0.14,'triangle',0.09);
  if(m)blip(m,0.1,tune.wave,tune.mv);
  if(musicStep%4===0)noise(0.03,0.05,4000);
  musicStep++;
}
let musicRun=false;
function musicLoop(){
  if(!musicRun)return;
  musicTick();
  // heartbeat kicks up when you're about to blow
  const danger=G.scene==='play'&&(G.fart>=85||G.puke>=85);
  musicTimer=setTimeout(musicLoop, currentTune().t*(danger?0.7:1));
}
function startMusic(){ if(musicRun)return; musicRun=true; musicLoop(); }
function stopMusic(){ musicRun=false; clearTimeout(musicTimer); musicTimer=null; }

/* =============== GAME STATE =============== */
const G = {
  scene:'title',        // title | select | intro | play | clear | win | over
  charKey:'fartman', level:0, lives:3, score:0,
  fart:30, puke:30,     // 0..100
  pose:'stand',         // stand | duck | jump
  jumpV:0, y:0,         // jump physics (y offset above floor, positive = up)
  foods:[], parts:[], floats:[],
  cam:240, px:480, docX:0,
  t:0, spawnT:0, shake:0, flash:0, flashCol:'#fff',
  readyPulse:0, sceneT:0, msg:'', msgT:0,
  releasing:0, releaseType:'',
  best:+(localStorage.getItem('pnp_best')||0),
  emoted:0
};
const BALANCE_MIN = 62;     // both meters at least this...
const BALANCE_GAP = 14;     // ...and within this gap => READY
const isReady = ()=> G.fart>=BALANCE_MIN && G.puke>=BALANCE_MIN && Math.abs(G.fart-G.puke)<=BALANCE_GAP;

function levelSpeed(){ return 1.5 + G.level*0.35; }
function spawnRate(){ return Math.max(38, 78 - G.level*8); }

/* =============== INPUT =============== */
const keys={};
addEventListener('keydown', e=>{
  if(['ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
  const k=e.key.toLowerCase();
  if(keys[k])return; keys[k]=true;
  handlePress(k, e.key);
});
addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });
function handlePress(k, raw){
  audio();
  if(G.scene==='title'){ if(k===' '||k==='enter'){ sfx.select(); toSelect(); } return; }
  if(G.scene==='select'){
    if(k==='arrowleft'||k==='a'||k==='arrowright'||k==='d'){ G.charKey = G.charKey==='fartman'?'poopqueen':'fartman'; sfx.select(); }
    if(k===' '||k==='enter'){ sfx.ready(); G.scene='howto'; G.sceneT=0; }
    return;
  }
  if(G.scene==='howto'){ if(k===' '||k==='enter'){ sfx.select(); toIntro(); } return; }
  if(G.scene==='intro'){ if(k===' '||k==='enter'){ startLevel(); } return; }
  if(G.scene==='splat')return; // enjoy the show
  if(G.scene==='boom'){ if((k===' '||k==='enter')&&G.sceneT>50){ nextLevel(); } return; }
  if(G.scene==='death'){ if((k===' '||k==='enter')&&G.sceneT>170){ resetGame(); } return; }
  if(G.scene==='win'){ if((k===' '||k==='enter')&&G.sceneT>140){ resetGame(); } return; }
  if(G.scene!=='play')return;
  if(k==='arrowup'||k==='w'){ jump(); }
  if(k==='f'){ release('fart'); }
  if(k==='b'){ release('burp'); }
  if(k===' '&&isReady()){ megaSplat(); }
}
// touch
function bindT(id, down, up){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();audio();down();},{passive:false});
  if(up)el.addEventListener('touchend',e=>{e.preventDefault();up();},{passive:false});
  el.addEventListener('click',e=>{audio();down();if(up)setTimeout(up,200);});
}
bindT('tJump', ()=>{ if(G.scene==='play')jump(); else handlePress(' '); });
bindT('tDuck', ()=>{ keys['arrowdown']=true; }, ()=>{ keys['arrowdown']=false; });
bindT('tFart', ()=>{ if(G.scene==='play')release('fart'); else if(G.scene==='select'){G.charKey='fartman';sfx.select();} });
bindT('tBurp', ()=>{ if(G.scene==='play')release('burp'); else if(G.scene==='select'){G.charKey='poopqueen';sfx.select();} });
bindT('tGo', ()=>{ if(G.scene==='play'){ if(isReady())megaSplat(); } else handlePress(' '); });

function jump(){
  if(G.y===0 && G.pose!=='duck'){ G.jumpV=6.4; G.pose='jump'; sfx.jump(); }
}
function release(type){
  if(G.releasing>0)return;
  G.releasing=26; G.releaseType=type;
  if(type==='fart'){
    const spent=Math.min(G.fart,30); G.fart-=spent; sfx.fart();
    puffCloud(G.px-10, FLOOR-12, '#9be564', '#5aa832', 16);
    addFloat(G.px, FLOOR-70, 'PFFFRRT!', '#9be564');
  } else {
    const spent=Math.min(G.puke,30); G.puke-=spent; sfx.burp();
    puffCloud(G.px+14, FLOOR-44, '#a8e6cf', '#69c9a0', 14);
    addFloat(G.px, FLOOR-78, 'BRAAAP!', '#a8e6cf');
  }
  G.shake=5;
}
function megaSplat(){
  G.scene='splat'; G.sceneT=0; G.shake=14; sfx.megasplat();
  G.score += 500 + G.level*250 + Math.round((100-Math.abs(G.fart-G.puke))*3);
  // fountain of glory
  for(let i=0;i<60;i++){
    G.parts.push({x:G.px-8+Math.random()*8, y:FLOOR-10, vx:-1-Math.random()*3, vy:-2-Math.random()*4,
      g:0.18, life:60+Math.random()*40, col:Math.random()<.5?'#8b5e34':'#6b4423', sz:2+Math.random()*3});
    G.parts.push({x:G.px+8+Math.random()*8, y:FLOOR-40, vx:1+Math.random()*3, vy:-2-Math.random()*4,
      g:0.18, life:60+Math.random()*40, col:Math.random()<.5?'#7ec850':'#b8e05a', sz:2+Math.random()*3});
  }
}

/* =============== SCENE TRANSITIONS =============== */
function toSelect(){ G.scene='select'; G.sceneT=0; startMusic(); }
function toIntro(){ G.scene='intro'; G.sceneT=0; }
function startLevel(){
  G.scene='play'; G.sceneT=0; G.fart=30; G.puke=30; G.px=480; G.cam=CAM_HOME;
  G.foods.length=0; G.parts.length=0; G.floats.length=0;
  G.spawnT=30; G.emoted=0; sfx.select();
}
function nextLevel(){
  G.level++;
  if(G.level>=LEVELS.length){ G.scene='win'; G.sceneT=0;
    if(G.score>G.best){G.best=G.score;localStorage.setItem('pnp_best',G.best);}
    return; }
  toIntro();
}
function loseLife(why){
  G.lives--; G.shake=12; G.flash=14; G.flashCol='#ff2244'; sfx.explode();
  addFloat(G.px, FLOOR-90, why, '#ff5a5a');
  G.fart=30; G.puke=30;
  if(G.lives<=0){ G.scene='death'; G.sceneT=0; G.docX=G.cam+W+40; sfx.gameover();
    if(G.score>G.best){G.best=G.score;localStorage.setItem('pnp_best',G.best);} }
}
function resetGame(){
  G.level=0; G.lives=3; G.score=0; toSelect();
}

/* =============== ENTITIES =============== */
const PX = 480;              // world center landmark (neon sign, level start spot)
const WORLD_W = 960;         // world is two screens wide — pan with ◀ ▶ or drag
const CAM_HOME = G.px - W/2;   // camera resting spot (player centered)
function spawnFood(){
  const L=LEVELS[G.level];
  const r=Math.random();
  let kind, type;
  if(r<0.38){ kind=L.fart; type='fart'; }
  else if(r<0.76){ kind=L.burp; type='burp'; }
  else { kind=L.veg; type='veg'; }
  const fromLeft=Math.random()<0.5;
  // three lanes: high (must jump to eat / stand+duck to avoid), mid (stand), low (duck to eat / jump to avoid)
  const lane=(Math.random()*3)|0;
  const laneY=[FLOOR-78, FLOOR-40, FLOOR-14][lane];
  const sp=levelSpeed()*(0.85+Math.random()*0.5);
  G.foods.push({
    kind, type, lane,
    x: fromLeft? G.cam-30 : G.cam+W+30,
    y: laneY, vx: fromLeft? sp : -sp,
    wob: Math.random()*6.28, spin:(Math.random()<.5?-1:1)*(0.05+Math.random()*0.06)
  });
}
function puffCloud(x,y,c1,c2,n){
  for(let i=0;i<n;i++)G.parts.push({
    x:x+(Math.random()*10-5), y:y+(Math.random()*10-5),
    vx:(Math.random()*2-1)*1.4, vy:-0.3-Math.random()*0.8, g:-0.01,
    life:25+Math.random()*25, col:Math.random()<.6?c1:c2, sz:3+Math.random()*4
  });
}
function crumbs(x,y,col){
  for(let i=0;i<10;i++)G.parts.push({
    x, y, vx:(Math.random()*2-1)*2.2, vy:-1-Math.random()*2, g:0.15,
    life:20+Math.random()*15, col, sz:1.5+Math.random()*2
  });
}
function addFloat(x,y,txt,col){ G.floats.push({x,y,txt,col,life:55}); }
// eruption from the restaurant exterior (screen coords — boom scene runs with cam=0)
function boomBurst(){
  for(let i=0;i<50;i++){
    const brown=Math.random()<0.5;
    G.parts.push({
      x:170+Math.random()*140, y:90+Math.random()*70,
      vx:(Math.random()*2-1)*4.5, vy:-2-Math.random()*4.5, g:0.14,
      life:50+Math.random()*50,
      col:brown?['#8b5e34','#6b4423','#a5754a'][i%3]:['#7ec850','#b8e05a','#57cc4a'][i%3],
      sz:2+Math.random()*4});
  }
}

/* =============== UPDATE =============== */
function playerHitbox(){
  // returns {top,bottom} of body at G.px
  if(G.y>0) return {top:FLOOR-52-G.y*8, bottom:FLOOR-G.y*8};
  if(G.pose==='duck') return {top:FLOOR-26, bottom:FLOOR};
  return {top:FLOOR-52, bottom:FLOOR};
}
function update(){
  G.t++; G.sceneT++;
  if(G.shake>0)G.shake*=0.85; if(G.shake<0.3)G.shake=0;
  if(G.flash>0)G.flash--;
  if(G.releasing>0)G.releasing--;
  // particles + floats always tick
  for(let i=G.parts.length-1;i>=0;i--){ const p=G.parts[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.life--; if(p.life<=0)G.parts.splice(i,1); }
  for(let i=G.floats.length-1;i>=0;i--){ const f=G.floats[i];
    f.y-=0.6; f.life--; if(f.life<=0)G.floats.splice(i,1); }
  // cutscene: simultaneous poop-and-puke, then cut to the exploding restaurant
  if(G.scene==='splat'){
    G.shake=Math.max(G.shake,2.5);
    for(let i=0;i<3;i++){
      G.parts.push({x:G.px+5,y:FLOOR-44,vx:1.5+Math.random()*3,vy:-2.5-Math.random()*2,g:0.14,
        life:45,col:['#7ec850','#b8e05a','#57cc4a'][i%3],sz:2+Math.random()*3});
      G.parts.push({x:G.px-5,y:FLOOR-12,vx:-1.5-Math.random()*3,vy:-1.5-Math.random()*2,g:0.14,
        life:45,col:['#8b5e34','#6b4423','#a5754a'][i%3],sz:2+Math.random()*3});
    }
    if(G.sceneT===70)sfx.puke();
    if(G.sceneT>=140){ G.scene='boom'; G.sceneT=0; G.parts.length=0; G.shake=16; sfx.explode(); boomBurst(); }
    return;
  }
  if(G.scene==='boom'){
    if(G.sceneT<30&&G.sceneT%7===0){ boomBurst(); G.shake=Math.max(G.shake,8); }
    return;
  }
  if(G.scene!=='play')return;

  // walk left/right (◀ ▶ keys or finger drag); camera follows the character
  const mvL=keys['arrowleft']||keys['a'], mvR=keys['arrowright']||keys['d'];
  const spd = G.pose==='duck'?1.5:2.8;
  if(mvL)G.px-=spd; if(mvR)G.px+=spd;
  G.px=Math.max(60,Math.min(WORLD_W-60,G.px));
  G.cam+=(Math.max(0,Math.min(WORLD_W-W,G.px-W/2))-G.cam)*0.12;
  // pose
  const duckHeld = keys['arrowdown']||keys['s']||keys['_tduck'];
  if(G.y===0){ G.pose = duckHeld ? 'duck' : 'stand'; }
  // jump physics
  if(G.jumpV!==0 || G.y>0){
    G.y += G.jumpV*0.16; G.jumpV -= 0.42;
    if(G.y<=0){ G.y=0; G.jumpV=0; G.pose=duckHeld?'duck':'stand'; }
    else G.pose='jump';
  }
  // gas leaks away over time — eat to keep the pressure up, and when
  // you're balanced, rip before it fades. Faster leak on later levels.
  const decay=0.026+G.level*0.005;
  G.fart=Math.max(0,G.fart-decay);
  G.puke=Math.max(0,G.puke-decay);
  // spawn
  if(--G.spawnT<=0){ spawnFood(); G.spawnT = spawnRate()*(0.7+Math.random()*0.6); }
  // foods
  const hb=playerHitbox();
  for(let i=G.foods.length-1;i>=0;i--){
    const f=G.foods[i]; f.x+=f.vx; f.wob+=0.15;
    if(f.x<-50||f.x>WORLD_W+50){ G.foods.splice(i,1); continue; }
    // collision with player column
    if(Math.abs(f.x-G.px)<16){
      const fy=f.y+Math.sin(f.wob)*2;
      if(fy+10>hb.top && fy-10<hb.bottom){
        G.foods.splice(i,1); eat(f); continue;
      }
    }
  }
  // ready cue
  if(isReady()){ G.readyPulse++;
    if(G.emoted===0){ G.emoted=1; sfx.ready(); G.flash=8; G.flashCol='#ffd23f'; }
  } else { G.readyPulse=0; if(G.emoted===1)G.emoted=0; }
  // meter overload / underload
  if(G.fart>=100){ loseLife('SHART DISASTER!!'); return; }
  if(G.puke>=100){ loseLife('SPEW ERUPTION!!'); return; }
}
function eat(f){
  if(f.type==='veg'){
    sfx.veg(); G.shake=4; G.flash=6; G.flashCol='#3fb950';
    // veg drains the HIGHER meter (spec: reduces gas)
    if(G.fart>=G.puke)G.fart=Math.max(0,G.fart-16); else G.puke=Math.max(0,G.puke-16);
    addFloat(G.px, FLOOR-70, 'EWW! VEGGIE!', '#7ec850');
    crumbs(G.px, FLOOR-40, '#3fb950');
    G.score=Math.max(0,G.score-25);
  } else if(f.type==='fart'){
    sfx.chomp(); G.fart=Math.min(100,G.fart+11); G.score+=50;
    addFloat(G.px, FLOOR-70, '+GAS', '#9be564'); crumbs(G.px, FLOOR-40, '#ffd23f');
  } else {
    sfx.chomp(); G.puke=Math.min(100,G.puke+11); G.score+=50;
    addFloat(G.px, FLOOR-70, '+QUEASE', '#59d8e6'); crumbs(G.px, FLOOR-40, '#e63946');
  }
}

/* =============== RENDER =============== */
function px(n){return Math.round(n);}
function text(str,x,y,size,col,align='center',font='bold'){
  ctx.font=`${font} ${size}px "Courier New",monospace`;
  ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.fillStyle='#000'; ctx.fillText(str,px(x)+2,px(y)+2);
  ctx.fillStyle=col; ctx.fillText(str,px(x),px(y));
}
function drawBG(){
  const L=LEVELS[Math.min(G.level,LEVELS.length-1)], T=L.theme;
  ctx.save(); ctx.translate(-px(G.cam),0);
  // ---- wall + ceiling ----
  ctx.fillStyle=T.wall; ctx.fillRect(0,0,WORLD_W,150);
  ctx.fillStyle=T.wall2;
  for(let x=0;x<WORLD_W;x+=32)ctx.fillRect(x,0,16,150);   // wallpaper stripes
  ctx.fillStyle='#1c1424'; ctx.fillRect(0,0,WORLD_W,14);  // ceiling
  ctx.fillStyle='#2b2038';
  for(let x=0;x<WORLD_W;x+=120)ctx.fillRect(x,0,6,14);    // joists
  // hanging lamps with warm glow
  for(const lx of [150,370,590,810]){
    const flick=((G.t+lx)/40|0)%9!==8;
    ctx.fillStyle='#333'; ctx.fillRect(lx-1,14,2,14);
    ctx.fillStyle=T.trim; ctx.fillRect(lx-9,28,18,7);
    ctx.fillStyle=flick?'#fff2b0':'#665'; ctx.fillRect(lx-5,35,10,4);
    if(flick){ ctx.globalAlpha=0.10; ctx.fillStyle='#ffe89a';
      ctx.beginPath(); ctx.moveTo(lx-9,37); ctx.lineTo(lx+9,37); ctx.lineTo(lx+30,150); ctx.lineTo(lx-30,150);
      ctx.closePath(); ctx.fill(); ctx.globalAlpha=1; }
  }
  // ---- wainscot trim ----
  ctx.fillStyle=T.trim; ctx.fillRect(0,146,WORLD_W,8);
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fillRect(0,152,WORLD_W,2);
  // ---- entrance door (far left) ----
  ctx.fillStyle='#3a2a1a'; ctx.fillRect(14,58,58,92);
  ctx.strokeStyle='#d9d9d9'; ctx.lineWidth=3; ctx.strokeRect(14,58,58,92);
  ctx.fillStyle='#0e2a4a'; ctx.fillRect(22,66,42,40);      // door glass
  ctx.fillStyle='#d9d9d9'; ctx.fillRect(20,116,46,5);      // push bar
  ctx.fillStyle=T.sign; ctx.fillRect(26,72,34,10);
  text('OPEN',43,77,7,'#14152b');
  // ---- windows with street life ----
  for(const wx of [104,884]){
    ctx.fillStyle='#0e2a4a'; ctx.fillRect(wx-34,58,68,64);
    ctx.strokeStyle='#d9d9d9'; ctx.lineWidth=3; ctx.strokeRect(wx-34,58,68,64);
    ctx.beginPath();ctx.moveTo(wx,58);ctx.lineTo(wx,122);ctx.moveTo(wx-34,90);ctx.lineTo(wx+34,90);ctx.stroke();
    // skyline
    ctx.fillStyle='#123456';
    ctx.fillRect(wx-30,74,10,16); ctx.fillRect(wx-14,68,12,22); ctx.fillRect(wx+6,78,14,12); ctx.fillRect(wx+24,70,8,20);
    // little car scrolling by
    const cx=((G.t*0.6+wx)%180)-50;
    if(cx>-30&&cx<28){ ctx.fillStyle='#ffd23f'; ctx.fillRect(wx+cx,102,16,7);
      ctx.fillStyle='#59d8e6'; ctx.fillRect(wx+cx+3,99,8,4);
      ctx.fillStyle='#222'; ctx.fillRect(wx+cx+2,109,4,4); ctx.fillRect(wx+cx+10,109,4,4); }
    // clouds + sun
    ctx.fillStyle='#ffd23f'; ctx.fillRect(wx+20,62,7,7);
    const cl=((G.t*0.25+wx*2)%150)-40;
    if(cl>-30&&cl<28){ ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fillRect(wx+cl,66,18,5); ctx.fillRect(wx+cl+4,62,10,5);}
  }
  // ---- framed food poster + jukebox (left wing) ----
  ctx.fillStyle='#14152b'; ctx.fillRect(196,62,64,54);
  ctx.strokeStyle=T.sign; ctx.lineWidth=3; ctx.strokeRect(196,62,64,54);
  ctx.drawImage(FOODS[L.fart],216,66);
  text('WOW!',228,102,8,T.sign);
  // jukebox
  const jx=300;
  ctx.fillStyle='#5e2a6e'; ctx.fillRect(jx,84,40,66);
  ctx.fillStyle='#ffd23f'; ctx.fillRect(jx+3,88,34,8);
  ctx.fillStyle=`hsl(${(G.t*4)%360},90%,55%)`; ctx.fillRect(jx+5,100,30,6);
  ctx.fillStyle='#14152b'; ctx.fillRect(jx+8,112,24,24);
  ctx.fillStyle=`hsl(${(G.t*4+120)%360},90%,60%)`;
  for(let i=0;i<3;i++)ctx.fillRect(jx+11+i*8,116+Math.abs(Math.sin(G.t*0.15+i))*10,4,6);
  // ---- neon sign over the player ----
  const on=(G.t/30|0)%4!==3;
  ctx.fillStyle='#14152b'; ctx.fillRect(PX-90,16,180,36);

function drawPlayer(){
  ctx.save(); ctx.translate(-px(G.cam),0);
  const C=CHARS[G.charKey];
  const yOff=G.y*8;
  if(G.scene==='play'&&G.releasing>0){
    // recoil wobble
    ctx.save(); ctx.translate(G.px,FLOOR-yOff);
    ctx.rotate(Math.sin(G.t*0.8)*0.06*(G.releaseType==='fart'?1:-1));
    ctx.translate(-G.px,-(FLOOR-yOff)); }
  if(G.pose==='duck'&&G.y===0){
    ctx.drawImage(C.duck, px(G.px-16), px(FLOOR-24));
  } else {
    const fr = G.pose==='jump' ? 1 : ((G.t/12|0)%2);
    const spr=C.idle[fr];
    ctx.drawImage(spr, px(G.px-16), px(FLOOR-52-yOff));
  }
  if(G.scene==='play'&&G.releasing>0)ctx.restore();
  // gas bulges: belly swells with stomach gas, butt with butt gas
  if(G.scene==='play'||G.scene==='splat'){
    const bf=G.fart/100, bp=G.puke/100;
    const dk=G.pose==='duck'&&G.y===0;
    const bellyY=dk?FLOOR-12:FLOOR-24-yOff;
    const buttY=dk?FLOOR-8:FLOOR-15-yOff;
    const wob=1+Math.sin(G.t*0.25)*0.05;
    if(bp>0.15){
      ctx.fillStyle=G.charKey==='fartman'?'#8d5524':'#b5179e';
      ctx.strokeStyle=G.charKey==='fartman'?'#5e3a1a':'#7a0f6e'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(G.px,bellyY,(2+bp*12)*wob,(2+bp*10)*wob,0,0,7);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.25)';
      ctx.beginPath(); ctx.ellipse(G.px-bp*4,bellyY-bp*3,bp*4,bp*3,0,0,7); ctx.fill();
    }
    if(bf>0.15){
      ctx.fillStyle=G.charKey==='fartman'?'#2b2d42':'#7a0f6e';
      ctx.strokeStyle='#14152b'; ctx.lineWidth=2;
      for(const sd of [-1,1]){
        ctx.beginPath();
        ctx.ellipse(G.px+sd*(8+bf*8),buttY,(2+bf*9)*wob,(2+bf*7)*wob,0,0,7);
        ctx.fill(); ctx.stroke();
      }
    }
  }
  // ready sparkle ring
  if(G.scene==='play'&&isReady()){
    const r=30+Math.sin(G.t*0.3)*4;
    ctx.strokeStyle=`hsl(${(G.t*8)%360},100%,60%)`; ctx.lineWidth=2;
    ctx.setLineDash([6,6]); ctx.lineDashOffset=-G.t;
    ctx.beginPath(); ctx.arc(G.px,FLOOR-26-G.y*8,r,0,7); ctx.stroke(); ctx.setLineDash([]);
  }
  ctx.restore();
}

function meter(x,y,w,label,val,col1,col2,icon){
  ctx.fillStyle='#14152b'; ctx.fillRect(x-2,y-2,w+4,16);
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.strokeRect(x-2,y-2,w+4,16);
  const fw=(w*val/100)|0;
  const grad=ctx.createLinearGradient(x,0,x+w,0);
  grad.addColorStop(0,col1); grad.addColorStop(1,col2);
  ctx.fillStyle=grad; ctx.fillRect(x,y,fw,12);
  // segment ticks
  ctx.fillStyle='rgba(0,0,0,.35)';
  for(let i=1;i<10;i++)ctx.fillRect(x+(w*i/10|0),y,1,12);
  // danger zone
  if(val>=85){ ctx.globalAlpha=0.5+0.5*Math.sin(G.t*0.5); ctx.fillStyle='#ff2244';
    ctx.fillRect(x+fw-3,y,3,12); ctx.globalAlpha=1; }
  text(icon+' '+label, x+w/2, y-11, 9, '#fff');
  text(val|0, x+w+16, y+6, 9, val>=85?'#ff5a5a':'#9df');
}

  drawParts();
  if(G.sceneT>140){
    ctx.fillStyle='rgba(10,5,10,.7)'; ctx.fillRect(0,0,W,92);
    text('GAME OVER',240,34,28,'#e63946');
    text('SCORE '+G.score+'  ·  BEST '+G.best,240,64,11,'#fff');
    if(G.sceneT>170&&(G.t/25|0)%2===0)text('SPACE TO TRY AGAIN',240,82,10,'#ffd23f');
  }
}
function drawWin(){
  // THE INAUGURATION — White House lawn, flag, crown, destiny
  ctx.fillStyle='#7fdbff'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffd23f'; ctx.fillRect(40,24,22,22); // sun
  ctx.fillStyle='rgba(255,255,255,.85)';
  for(const cy of [30,54]){ const off=((G.t*0.25+cy*7)%560)-40; ctx.fillRect(off,cy,30,7); ctx.fillRect(off+8,cy-5,16,7); }
  // the White House
  ctx.fillStyle='#f5f5f0'; ctx.fillRect(120,84,240,96);
  ctx.fillStyle='#e2e2da'; ctx.fillRect(110,74,260,12);
  ctx.fillStyle='#d9d9d0';
  ctx.beginPath(); ctx.moveTo(200,74); ctx.lineTo(240,48); ctx.lineTo(280,74); ctx.closePath(); ctx.fill();
  for(let i=0;i<6;i++){ ctx.fillStyle='#fff'; ctx.fillRect(134+i*38,92,12,84);
    ctx.fillStyle='#c9c9c0'; ctx.fillRect(132+i*38,88,16,5); }
  ctx.fillStyle='#3a2a1a'; ctx.fillRect(228,140,24,40);
  for(const wx of [150,300]){ ctx.fillStyle='#0e2a4a'; ctx.fillRect(wx,104,22,26);
    ctx.strokeStyle='#aaa'; ctx.lineWidth=2; ctx.strokeRect(wx,104,22,26); }
  // flagpole
  ctx.fillStyle='#8a8a94'; ctx.fillRect(84,60,3,120);
  drawFlag(84,60,1.3);
  // lawn + red carpet
  ctx.fillStyle='#3fb950'; ctx.fillRect(0,180,W,90);
  ctx.fillStyle='#2e7d32'; for(let x=0;x<W;x+=26)ctx.fillRect(x,180,13,90);
  ctx.fillStyle='#c1121f';
  ctx.beginPath(); ctx.moveTo(210,180); ctx.lineTo(270,180); ctx.lineTo(300,270); ctx.lineTo(180,270); ctx.closePath(); ctx.fill();
  // confetti
  if(G.t%2===0)G.parts.push({x:Math.random()*W,y:-5,vx:(Math.random()-0.5),vy:1+Math.random()*1.5,g:0.02,
    life:220,col:['#e63946','#fff','#1d4ed8','#ffd23f'][Math.random()*4|0],sz:3});
  // the official marches in with your flag
  const ot=Math.min(1,G.sceneT/80);
  const ox=430-ot*130;
  ctx.drawImage(OFFICIAL.walk[ot<1?(G.t/8|0)%2:0],px(ox-16),162);
  if(G.sceneT<=90)drawFlag(ox-30,140,1);
  // YOU, at the podium (scaled up), receiving everything
  const C=CHARS[G.charKey];
  ctx.save(); ctx.translate(240,214); ctx.scale(1.6,1.6);
  ctx.drawImage(C.idle[(G.t/10|0)%2],-16,-52); ctx.restore();
  if(G.sceneT>90)drawFlag(206,120,1.1);                       // flag presented
  if(G.sceneT>110){                                            // crown descends
    const cy=Math.max(122,180-(G.sceneT-110)*2);
    drawCrown(240,cy,1.4);
    if(cy<=122&&(G.t/8|0)%2===0){ ctx.fillStyle='#fff';       // sparkle
      ctx.fillRect(px(226+(G.t%3)*10),px(118+(G.t%2)*4),2,2); }
  }
  drawParts();
  // proclamation
  if(G.sceneT>130){
    ctx.fillStyle='rgba(10,10,40,.6)'; ctx.fillRect(0,6,W,58);
    const p=Math.sin(G.t*0.2);
    ctx.save(); ctx.translate(240,24); ctx.scale(1+p*0.04,1+p*0.04);
    text('🎉 CONGRATULATIONS!! 🎉',0,0,16,'#ffd23f'); ctx.restore();
    text('YOU ARE NOW PRESIDENT OF THE UNITED STATES',240,44,11,'#fff');
    text('HAIL TO THE POOP CHIEF',240,57,8,'#ff5ad1');
  }
  if(G.sceneT>160){
    text('FINAL SCORE '+G.score+(G.score>=G.best?'  ★ NEW HI-SCORE ★':''),240,246,10,'#14152b');
    if((G.t/25|0)%2===0)text('SPACE TO SERVE ANOTHER TERM',240,260,9,'#14152b');
  }
}
/* =============== MAIN LOOP =============== */
function render(){
  ctx.save();
  if(G.shake>0)ctx.translate((Math.random()*2-1)*G.shake,(Math.random()*2-1)*G.shake);
  if(G.scene==='win'||G.scene==='boom')G.cam=0;
  else if(G.scene!=='play'&&G.scene!=='splat'&&G.scene!=='death')G.cam=CAM_HOME;
  if(G.scene==='title')drawTitle();
  else if(G.scene==='select')drawSelect();
  else if(G.scene==='howto')drawHowto();
  else if(G.scene==='intro')drawIntro();
  else if(G.scene==='splat')drawSplat();
  else if(G.scene==='boom')drawBoom();
  else if(G.scene==='death')drawDeath();
  else if(G.scene==='win')drawWin();
  else{
    drawBG(); drawFoods(); drawPlayer(); drawParts(); drawHUD();
  }
  if(G.flash>0){ ctx.globalAlpha=G.flash/28; ctx.fillStyle=G.flashCol; ctx.fillRect(-20,-20,W+40,H+40); ctx.globalAlpha=1; }
  ctx.restore();
}
let last=0, acc=0; const STEP=1000/60;
function loop(ts){
  requestAnimationFrame(loop);
  if(!last)last=ts;
  acc+=Math.min(100,ts-last); last=ts;
  while(acc>=STEP){ update(); acc-=STEP; }
  render();
}
requestAnimationFrame(loop);
// ---- mobile: swipe on the canvas (up = jump, down = duck, drag = look around) ----
let touchX=0, touchY=0, touchPX=0, touchLive=false;
cv.addEventListener('touchstart', e=>{
  e.preventDefault(); audio();
  const t=e.touches[0]; touchX=t.clientX; touchY=t.clientY; touchPX=G.px; touchLive=true;
},{passive:false});
cv.addEventListener('touchmove', e=>{
  e.preventDefault(); if(!touchLive)return;
  const t=e.touches[0];
  if(G.scene!=='play')return;
  const sc=cv.clientWidth/W || 1;
  const dx=(t.clientX-touchX)/sc, dy=t.clientY-touchY;
  if(Math.abs(dx)>8){ G.px=Math.max(60,Math.min(WORLD_W-60,touchPX+dx)); }
  keys['_tduck'] = dy>36;
  if(dy<-36 && G.y===0){ jump(); touchY=t.clientY; }
},{passive:false});
cv.addEventListener('touchend', e=>{
  e.preventDefault();
  const wasTap = touchLive && G.scene!=='play' ;
  touchLive=false; keys['_tduck']=false;
  if(wasTap)handlePress(' ');  // tap canvas = advance menus
},{passive:false});
// show touch controls on any touch-capable device
if('ontouchstart' in window || navigator.maxTouchPoints>0){
  document.getElementById('touch').style.display='flex';
}
// unlock audio on first interaction
addEventListener('pointerdown', ()=>audio(), {once:false});
</script>
